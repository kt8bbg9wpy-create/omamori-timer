
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タイマー統合</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; margin: 0; background-color: #f0f2f5; flex-direction: column; min-height: 100vh; color: #333; transition: background-color 0.3s, color 0.3s; }
        .container { text-align: center; background: white; padding: 1.5rem; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; width: 90%; margin: 1rem auto; transition: background-color 0.3s, box-shadow 0.3s;}
        .count-display { font-size: 4rem; font-weight: bold; color: #007bff; margin: 1rem 0; }
        .controls { margin-top: 1.5rem; }
        input[type="number"] { width: 60px; padding: 5px; font-size: 1rem; background-color: #f8f8f8; border: 1px solid #ddd; border-radius: 5px; color: #333;}
        button { padding: 10px 20px; font-size: 1.1rem; cursor: pointer; border: none; border-radius: 5px; transition: 0.2s; margin: 5px;}
        .start { background-color: #28a745; color: white; }
        .start:hover { background-color: #218838; }
        .stop { background-color: #dc3545; color: white; }
        .stop:hover { background-color: #c82333; }
        .reset { background-color: #ffc107; color: white; }
        .reset:hover { background-color: #e0a800; }
        .setting { margin: 10px 0; text-align: left; font-size: 0.9rem; }
        .setting label { display: inline-block; width: 110px; font-weight: bold; }
        .section {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #eee;
        }
        .stopwatch-display {
            font-size: 4rem;
            font-weight: bold;
            color: #6c757d;
            margin: 1rem 0;
        }
        #lapTimesList {
            list-style: none;
            padding: 0;
            margin-top: 1rem;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 5px;
            text-align: left;
            color: #555;
        }
        #lapTimesList li {
            padding: 5px 10px;
            border-bottom: 1px solid #eee;
            font-size: 0.9rem;
            color: #555;
        }
        #lapTimesList li:last-child {
            border-bottom: none;
        }

        /* Countdown Timer Specific Styles */
        .countdown-display { font-size: 3rem; font-weight: bold; font-family: monospace; color: #000; margin-bottom: 20px; }
        .countdown-phase-label { font-size: 0.9rem; color: #000; margin-bottom: 5px; height: 1.2rem; }
        .countdown-slider-track {
            position: relative;
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin: 30px 0;
        }

        /* Night Mode Styles */
        body.night-mode {
            background-color: #1a1a1a;
            color: #e0e0e0;
        }
        body.night-mode .container {
            background: #2a2a2a;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        body.night-mode .count-display {
            color: #90caf9; /* Lighter blue */
        }
        body.night-mode .countdown-display { /* Night mode for countdown display */
            color: #e0e0e0;
        }
        body.night-mode .countdown-phase-label { /* Night mode for countdown phase label */
            color: #b0b0b0;
        }
        body.night-mode .section {
            border-top-color: #444;
        }
        body.night-mode .stopwatch-display {
            color: #b0b0b0;
        }
        body.night-mode #lapTimesList {
            border-color: #444;
            color: #b0b0b0;
        }
        body.night-mode #lapTimesList li {
            border-bottom-color: #444;
            color: #b0b0b0;
        }
        body.night-mode input[type="number"] {
            background-color: #3a3a3a;
            border-color: #555;
            color: #e0e0e0;
        }
        body.night-mode .toggle-mode-btn {
            background-color: #555;
            color: #e0e0e0;
        }
        body.night-mode .toggle-mode-btn:hover {
            background-color: #777;
        }

    </style>
</head>
<body class="night-mode"> <!-- Added night-mode class by default -->

<div class="container">
    <h2>1000カウント・メトロノーム</h2>
    <div>
        <label for="targetCount" style="color: #007bff; font-weight: bold;">Target:</label>
        <input type="number" id="targetCount" value="1000" min="1">
    </div>
    <div id="display" class="count-display">0</div>
    <div>
        <label style="color: #ff0000; font-weight: bold;">BPM: </label>
        <input type="number" id="bpm" value="120" min="40" max="300">
    </div>
    <div class="controls">
        <button id="startMetronomeBtn" class="start" onclick="toggleMetronome()">スタート</button>
        <button id="stopMetronomeBtn" class="stop" onclick="toggleMetronome()" style="display: none;">ストップ</button>
        <button id="resetMetronomeBtn" class="reset" onclick="resetMetronome()">リセット</button>
    </div>

    <!-- Stopwatch Section -->
    <div class="section">
        <h3 style="font-size: 1.8rem; color: #007bff;">ストップウォッチ</h3>
        <div id="stopwatchDisplay" class="stopwatch-display">00:00.000</div>
        <div class="stopwatch-controls">
            <button id="startStopwatchBtn" class="start" onclick="startStopwatch()">スタート</button>
            <button id="stopStopwatchBtn" class="stop" onclick="stopStopwatch()" style="display: none;">ストップ</button>
            <button id="lapStopwatchBtn" class="reset" onclick="lapStopwatch()">ラップ</button>
            <button id="resetStopwatchBtn" class="reset" onclick="resetStopwatch()">リセット</button>
        </div>
        <ul id="lapTimesList"></ul>
    </div>

    <!-- Countdown Timer Section -->
    <div class="section">
        <h3 style="font-size: 1.8rem; color: #007bff;">カウントダウンタイマー</h3>
        <div id="countdownPhaseLabel" class="countdown-phase-label">待機中</div>
        <div id="countdownDisplay" class="countdown-display">00 分 30 秒 00</div>

        <div class="countdown-slider-track">
            <!-- スライダーは削除されました -->
        </div>

        <div class="setting">
            <label>待機時間</label>
            <input type="number" id="countdownMin" value="0"> 分 <input type="number" id="countdownSec" value="30"> 秒 [1]
        </div>
        <div class="setting">
            <label>開始までの猶予</label>
            <input type="number" id="countdownDelayMin" value="0"> 分 <input type="number" id="countdownDelaySec" value="5"> 秒 [1]
        </div>
        <div class="setting">
            <label>切り上げ</label>
            <input type="number" id="countdownUpMin" value="0"> 分 <input type="number" id="countdownUpSec" value="0"> 秒 [1]
        </div>
        <div class="setting" style="text-align: center; margin-top: 15px;">
            <input type="checkbox" id="countdownLoopEnable"> 無限ループ [1]
            <input type="checkbox" id="countdownSoundEnable" checked> サウンド有効 [1]
        </div>

        <div class="controls">
            <button id="startCountdownBtn" class="start">開始</button>
            <button id="stopCountdownBtn" class="stop">停止</button>
            <button id="resetCountdownBtn" class="reset">リセット</button>
        </div>
    </div>

    <div class="section">
        <button class="toggle-mode-btn" onclick="toggleNightMode()">モード切り替え</button>
    </div>
</div>

<script>
    let count = 0;
    let metronomeTimer = null; // Renamed from 'timer' to avoid conflict with countdown timer
    let audioCtx = null;

    // Countdown Timer variables
    let countdownTimerId = null;
    let countdownStartTime = 0;
    let countdownPhase = "idle";
    let countdownTotalMs = 0;
    let countdownDelayMs = 0;
    let countdownEarlyFinishMs = 0;
    let countdownLastBeepedSecond = -1;

    // Stopwatch variables
    let stopwatchStartTime = 0;
    let stopwatchElapsedTime = 0;
    let stopwatchTimer = null;
    let stopwatchRunning = false;
    let lapTimes = [];

    function playSound() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = count % 10 === 0 ? 'sine' : 'square'; // 10回ごとに音を変える
        osc.frequency.setValueAtTime(count % 10 === 0 ? 880 : 440, audioCtx.currentTime);

        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    function toggleMetronome() {
        const startBtn = document.getElementById('startMetronomeBtn');
        const stopBtn = document.getElementById('stopMetronomeBtn');
        const bpmInput = document.getElementById('bpm');
        const targetCountInput = document.getElementById('targetCount');
        const target = parseInt(targetCountInput.value);

        if (metronomeTimer) {
            clearInterval(metronomeTimer);
            metronomeTimer = null;
            startBtn.style.display = 'inline-block';
            stopBtn.style.display = 'none';
        } else {
            const interval = 60000 / bpmInput.value;
            startBtn.style.display = 'none';
            stopBtn.style.display = 'inline-block';

            metronomeTimer = setInterval(() => {
                count++;
                document.getElementById('display').innerText = count;
                playSound();

                if (count >= target) {
                    clearInterval(metronomeTimer);
                    // alert(`${target}カウント達成！`); // Removed the alert
                    toggleMetronome();
                    count = 0;
                    document.getElementById('display').innerText = count;
                }
            }, interval);
        }
    }

    function resetMetronome() {
        const startBtn = document.getElementById('startMetronomeBtn');
        const stopBtn = document.getElementById('stopMetronomeBtn');
        if (metronomeTimer) {
            clearInterval(metronomeTimer);
            metronomeTimer = null;
        }
        count = 0;
        document.getElementById('display').innerText = count;
        startBtn.style.display = 'inline-block';
        stopBtn.style.display = 'none';
    }

    // Countdown Timer functions
    function playBeepCountdown() {
        if (!document.getElementById('countdownSoundEnable').checked) return;
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); // Initialize if not already
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.value = 880;
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.5);
    }

    function updateCountdownDisplay(ms) {
        const countdownDisplay = document.getElementById('countdownDisplay');
        if (ms < 0) ms = 0;
        const totalSec = Math.floor(ms / 1000);
        const m = Math.floor(totalSec / 60);
        const s = totalSec % 60;
        const cs = Math.floor((ms % 1000) / 10);
        countdownDisplay.textContent = `${String(m).padStart(2, '0')} 分 ${String(s).padStart(2, '0')} 秒 ${String(cs).padStart(2, '0')}`;
    }

    function runCountdown() {
        const now = Date.now();
        let elapsedMsFromPhaseStart = now - countdownStartTime;

        let currentPhaseTotalDurationMs;
        let currentPhaseRemainingMs;
        const countdownLabel = document.getElementById('countdownPhaseLabel');

        if (countdownPhase === "delay") {
            currentPhaseTotalDurationMs = countdownDelayMs;
            currentPhaseRemainingMs = countdownDelayMs - elapsedMsFromPhaseStart;
            countdownLabel.textContent = "開始までの猶予...";
        } else if (countdownPhase === "active") {
            currentPhaseTotalDurationMs = countdownTotalMs - countdownEarlyFinishMs;
            currentPhaseRemainingMs = currentPhaseTotalDurationMs - elapsedMsFromPhaseStart;
            countdownLabel.textContent = "カウント中";

            const currentSecondsLeft = Math.floor(currentPhaseRemainingMs / 1000);

            if (currentSecondsLeft > 0 && currentSecondsLeft <= 10) {
                if (currentSecondsLeft !== countdownLastBeepedSecond) {
                    playBeepCountdown();
                    countdownLastBeepedSecond = currentSecondsLeft;
                }
            }
        } else { // idle 状態の場合
            return;
        }

        updateCountdownDisplay(currentPhaseRemainingMs);

        // フェーズ遷移のロジック
        if (currentPhaseRemainingMs <= 0) {
            if (countdownPhase === "delay") {
                countdownPhase = "active";
                countdownStartTime = Date.now();
                countdownLabel.textContent = "カウント中";
                countdownLastBeepedSecond = 11;
            } else if (countdownPhase === "active") { // アクティブフェーズが終了
                playBeepCountdown();
                if (document.getElementById('countdownLoopEnable').checked) {
                    initAndStartCountdown();
                } else {
                    stopCountdownTimer();
                    updateCountdownDisplay(0);
                    countdownLabel.textContent = "終了";
                }
            }
        }
    }

    function initAndStartCountdown() {
        countdownTotalMs = (parseInt(document.getElementById('countdownMin').value) * 60 + parseInt(document.getElementById('countdownSec').value)) * 1000;
        countdownDelayMs = (parseInt(document.getElementById('countdownDelayMin').value) * 60 + parseInt(document.getElementById('countdownDelaySec').value)) * 1000;
        countdownEarlyFinishMs = (parseInt(document.getElementById('countdownUpMin').value) * 60 + parseInt(document.getElementById('countdownUpSec').value)) * 1000;
        countdownStartTime = Date.now();

        if (countdownDelayMs > 0) {
            countdownPhase = "delay";
            document.getElementById('countdownPhaseLabel').textContent = "開始までの猶予...";
            countdownLastBeepedSecond = -1;
        } else {
            countdownPhase = "active";
            document.getElementById('countdownPhaseLabel').textContent = "カウント中";
            countdownLastBeepedSecond = 11;
        }

        updateCountdownDisplay(countdownPhase === "delay" ? countdownDelayMs : (countdownTotalMs - countdownEarlyFinishMs));

        if (countdownTimerId) clearInterval(countdownTimerId);
        countdownTimerId = setInterval(runCountdown, 10);
    }

    function stopCountdownTimer() {
        clearInterval(countdownTimerId);
        countdownTimerId = null;
        countdownPhase = "idle";
        document.getElementById('countdownPhaseLabel').textContent = "待機中";
        countdownLastBeepedSecond = -1;
    }

    function resetCountdownTimer() {
        stopCountdownTimer();
        const initialMin = parseInt(document.getElementById('countdownMin').value) || 0;
        const initialSec = parseInt(document.getElementById('countdownSec').value) || 0;
        updateCountdownDisplay((initialMin * 60 + initialSec) * 1000);
        document.getElementById('countdownPhaseLabel').textContent = "待機中";
        countdownLastBeepedSecond = -1;
    }


    // Stopwatch functions (unchanged)
    function formatTime(ms) {
        const totalSeconds = Math.floor(ms / 1000);
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        const milliseconds = Math.floor((ms % 1000));
        return (
            minutes.toString().padStart(2, '0') + ':' +
            seconds.toString().padStart(2, '0') + '.' +
            milliseconds.toString().padStart(3, '0').slice(0, 3)
        );
    }

    function updateStopwatchDisplay() {
        const stopwatchDisplay = document.getElementById('stopwatchDisplay');
        const currentTime = Date.now();
        const currentElapsedTime = stopwatchRunning ? currentTime - stopwatchStartTime + stopwatchElapsedTime : stopwatchElapsedTime;
        stopwatchDisplay.innerText = formatTime(currentElapsedTime);
    }

    function startStopwatch() {
        const startStopwatchBtn = document.getElementById('startStopwatchBtn');
        const stopStopwatchBtn = document.getElementById('stopStopwatchBtn');
        const lapStopwatchBtn = document.getElementById('lapStopwatchBtn');

        if (!stopwatchRunning) {
            stopwatchStartTime = Date.now();
            stopwatchTimer = setInterval(updateStopwatchDisplay, 10);
            stopwatchRunning = true;

            startStopwatchBtn.style.display = 'none';
            stopStopwatchBtn.style.display = 'inline-block';
            lapStopwatchBtn.style.display = 'inline-block';
        }
    }

    function stopStopwatch() {
        const startStopwatchBtn = document.getElementById('startStopwatchBtn');
        const stopStopwatchBtn = document.getElementById('stopStopwatchBtn');
        const lapStopwatchBtn = document.getElementById('lapStopwatchBtn');

        if (stopwatchRunning) {
            clearInterval(stopwatchTimer);
            stopwatchElapsedTime += Date.now() - stopwatchStartTime;
            stopwatchRunning = false;

            startStopwatchBtn.style.display = 'inline-block';
            stopStopwatchBtn.style.display = 'none';
            lapStopwatchBtn.style.display = 'none';
        }
    }

    function lapStopwatch() {
        if (stopwatchRunning) {
            const currentTotalElapsedTime = Date.now() - stopwatchStartTime + stopwatchElapsedTime;
            const lastLapTime = lapTimes.length > 0 ? lapTimes[lapTimes.length - 1].totalElapsedTime : 0;
            const lapDuration = currentTotalElapsedTime - lastLapTime;

            lapTimes.push({ totalElapsedTime: currentTotalElapsedTime, duration: lapDuration });
            const lapTimesList = document.getElementById('lapTimesList');
            const li = document.createElement('li');
            li.textContent = `Lap ${lapTimes.length}: ${formatTime(currentTotalElapsedTime)} (Duration: ${formatTime(lapDuration)})`;
            lapTimesList.prepend(li);
        }
    }

    function resetStopwatch() {
        const startStopwatchBtn = document.getElementById('startStopwatchBtn');
        const stopStopwatchBtn = document.getElementById('stopStopwatchBtn');
        const lapStopwatchBtn = document.getElementById('lapStopwatchBtn');

        clearInterval(stopwatchTimer);
        stopwatchStartTime = 0;
        stopwatchElapsedTime = 0;
        stopwatchRunning = false;
        lapTimes = [];
        document.getElementById('stopwatchDisplay').innerText = '00:00.000';
        document.getElementById('lapTimesList').innerHTML = '';

        startStopwatchBtn.style.display = 'inline-block';
        stopStopwatchBtn.style.display = 'none';
        lapStopwatchBtn.style.display = 'none';
    }

    function toggleNightMode() {
        document.body.classList.toggle('night-mode');
    }

    // Add event listeners for countdown timer
    document.getElementById('startCountdownBtn').addEventListener('click', initAndStartCountdown);
    document.getElementById('stopCountdownBtn').addEventListener('click', stopCountdownTimer);
    document.getElementById('resetCountdownBtn').addEventListener('click', resetCountdownTimer);

    window.onload = function() {
        resetMetronome(); // Initialize metronome display
        resetCountdownTimer(); // Initialize countdown display
    };
</script>

</body>
</html>
